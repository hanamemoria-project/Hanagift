    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float u_time;
        uniform float u_transition;
        uniform float u_motionIntensity;
        uniform float u_pixelRatio;
        
        attribute float a_random;
        attribute vec3 a_startPos;
        attribute vec3 a_targetPos;
        
        varying float vRandom;
        varying float vDepth;
        varying vec3 vPos;

        void main() {
            vRandom = a_random;
            vec3 basePos = mix(a_startPos, a_targetPos, u_transition);

            float speed1 = 0.4 + a_random * 0.6;
            float speed2 = 0.3 + a_random * 0.5;
            float amp    = (0.03 + a_random * 0.06) * u_motionIntensity;
            float phase  = a_random * 62.83;

            vec3 pos = basePos + vec3(
                sin(u_time * speed1 + phase)                          * amp,
                cos(u_time * speed2 + phase * 1.3)                    * amp,
                sin(u_time * (speed1 + speed2) * 0.5 + phase * 0.7)  * amp * 0.6
            );

            vPos = pos;

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            vDepth = -mvPosition.z;

            // Kecil-kecil: 0.5–1.5px, tanpa hero boost
            float baseSize = 0.5 + a_random * 1.0;
            gl_PointSize = baseSize * (120.0 / -mvPosition.z);
            gl_Position  = projectionMatrix * mvPosition;
        }
    </script>
    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform vec3 u_color;
        uniform vec3 u_color2;
        varying float vRandom;
        varying float vDepth;
        varying vec3 vPos;

        void main() {
            vec2 uv = gl_PointCoord - vec2(0.5);
            float dist = length(uv);
            if (dist > 0.5) discard;

            // Titik kecil lembut — tanpa glow/bloom
            float alpha = smoothstep(0.5, 0.1, dist) * (0.5 + vRandom * 0.35);

            // Warna dari u_color, sedikit variasi kecerahan
            vec3 col = u_color * (0.7 + vRandom * 0.3);

            gl_FragColor = vec4(col, alpha);
        }
    </script>

        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqbnV2bHJkeHpxdGZwcGJoaW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjU2OTYsImV4cCI6MjA5MDY0MTY5Nn0.slqPc8v7QZXxHzvMkOlXWAAYebX-sqUIiKZvA9DJkl0';

        // Tiga.js Partikel Variabel
        let scene, camera, renderer, clock;

        const patternData = {};
        const patternNames = ['scatter', 'singularity', 'chest', 'chest_open_tulip', 'heart', 'explode', 'frame_dynamic', 'shatter', 'envelope_closed', 'envelope_open'];

        function updateStatus(text, color = null, borderColor = null) {

        // --- 2. FETCH DATA SUPABASE SAAT HALAMAN DIMUAT ---

                    `;

                    // Mulai Render 3D Partikel & Sensor
                    document.getElementById('loading-sub').innerText = "Menghidupkan anti-lag engine";

        // --- 3. LOGIKA ENGINE PARTIKEL (THREE.JS) ---
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6.0; 

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance", alpha: false });
            renderer.setClearColor(0x080810, 1);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            renderer.domElement.id = "particle-canvas";
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();
            window.addEventListener('resize', onWindowResize, false);

            document.getElementById('color-picker').addEventListener('input', (e) => {
                if(particleMaterial) {
                    particleMaterial.uniforms.u_color.value.set(e.target.value);
                }
            });
        }

        function createParticles() {
            patternNames.forEach(name => {
                const arr = new Float32Array(particleCount * 3);
                generatePattern(arr, name);
                patternData[name] = arr;
            });

            const geometry = new THREE.BufferGeometry();
            const randoms = new Float32Array(particleCount);
            for (let i = 0; i < particleCount; i++) randoms[i] = Math.random();

            geometry.setAttribute('position',    new THREE.BufferAttribute(new Float32Array(patternData['scatter']), 3));
            geometry.setAttribute('a_startPos',  new THREE.BufferAttribute(new Float32Array(patternData['scatter']), 3));
            geometry.setAttribute('a_targetPos', new THREE.BufferAttribute(new Float32Array(patternData['scatter']), 3));
            geometry.setAttribute('a_random',    new THREE.BufferAttribute(randoms, 1));

            particleMaterial = new THREE.ShaderMaterial({
                vertexShader:   document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                uniforms: {
                    u_time:           { value: 0 },
                    u_transition:     { value: 1.0 },
                    u_color:          { value: new THREE.Color(document.getElementById('color-picker').value) },
                    u_motionIntensity:{ value: 1.0 }
                },
                transparent: true,
                depthWrite: false,
                depthTest: false,
                blending: THREE.NormalBlending
            });

            particles = new THREE.Points(geometry, particleMaterial);
            scene.add(particles);
        }

        function generatePattern(positions, pattern) {
            for (let i = 0; i < particleCount; i++) {
                let x = 0, y = 0, z = 0;
                const pIdx = i * 3;
                const rand1 = Math.random();
                const rand2 = Math.random();
                
                switch (pattern) {
                    case 'scatter': 
                        x = (Math.random() - 0.5) * 20; y = (Math.random() - 0.5) * 20; z = (Math.random() - 0.5) * 20;
                        break;
                    case 'singularity': 
                        x = (Math.random() - 0.5) * 0.1; y = (Math.random() - 0.5) * 0.1; z = (Math.random() - 0.5) * 0.1;
                        break;
                    case 'chest': 
                        const pC = Math.random();
                        if (pC < 0.6) {
                            let face = Math.floor(Math.random() * 6);
                            let cx = (Math.random()-0.5)*2.4, cy = (Math.random()-0.5)*1.2 - 0.5, cz = (Math.random()-0.5)*1.6; 
                            if (face===0) { x=1.2; y=cy; z=cz; } else if (face===1) { x=-1.2; y=cy; z=cz; }
                            else if (face===2) { x=cx; y=0.1; z=cz; } else if (face===3) { x=cx; y=-1.1; z=cz; }
                            else if (face===4) { x=cx; y=cy; z=0.8; } else { x=cx; y=cy; z=-0.8; }
                        } else if (pC < 0.95) {
                            let theta = Math.PI * rand1, len = (rand2 - 0.5) * 2.4;
                            x = len; y = 0.1 + 0.8 * Math.sin(theta); z = 0.8 * Math.cos(theta);
                        } else {
                            x = (Math.random()-0.5)*0.3; y = 0.0 + (Math.random()-0.5)*0.3; z = 0.85 + (Math.random()*0.1);
                        }
                        break;
                    case 'chest_open_tulip': 
                        if (Math.random() < 0.3) {
                            let isLid = Math.random() > 0.6;
                            if(!isLid) {
                                let f = Math.floor(Math.random() * 6);
                                let cx = (Math.random()-0.5)*2.4, cy = (Math.random()-0.5)*1.2 - 0.5, cz = (Math.random()-0.5)*1.6; 
                                if (f===0) { x=1.2; y=cy; z=cz; } else if (f===1) { x=-1.2; y=cy; z=cz; }
                                else if (f===2) { x=cx; y=0.1; z=cz; } else if (f===3) { x=cx; y=-1.1; z=cz; }
                                else if (f===4) { x=cx; y=cy; z=0.8; } else { x=cx; y=cy; z=-0.8; }
                            } else {
                                let theta = Math.PI * rand1, len = (rand2 - 0.5) * 2.4;
                                let origY = 0.8 * Math.sin(theta), origZ = 0.8 * Math.cos(theta);
                                let angle = 2.0; 
                                x = len; y = 0.1 + origY * Math.cos(angle) - (origZ+0.8) * Math.sin(angle);
                                z = -0.8 + origY * Math.sin(angle) + (origZ+0.8) * Math.cos(angle);
                            }
                            y -= 2.0; 
                        } else {
                            const part = Math.random();
                            const scaleF = 0.8; 
                            if (part < 0.6) { 
                                const u = rand1, v = rand2 * Math.PI * 2;
                                const rProfile = Math.pow(u, 0.4) * (1.2 - u * 0.4); 
                                const petals = 1.0 + 0.15 * Math.sin(6 * v) * u;
                                const R = rProfile * petals * (0.85 + 0.15 * Math.random()) * scaleF;
                                x = R * Math.cos(v); z = R * Math.sin(v);
                                y = ((u * 1.8) + (Math.abs(Math.sin(3 * v)) * 0.3 * Math.pow(u, 2))) * scaleF; 
                            } else if (part < 0.7) { 
                                const u = rand1, theta = rand2 * Math.PI * 2;
                                y = (-u * 2.8) * scaleF; 
                                const r = (0.04 + Math.random() * 0.04) * scaleF; 
                                x = r * Math.cos(theta) + Math.sin(u * 2.0) * 0.05; z = r * Math.sin(theta);
                            } else { 
                                const u = rand1, v = rand2; 
                                const spineX = Math.pow(u, 1.5) * 1.5 * scaleF;
                                const spineY = (-2.0 + u * 2.5) * scaleF;
                                const spineZ = Math.sin(u * Math.PI) * 0.4 * scaleF; 
                                const leafWidth = Math.sin(u * Math.PI) * 0.5 * (1.0 - u * 0.2) * scaleF;
                                x = spineX + (v - 0.5) * leafWidth * 0.6;
                                y = spineY + Math.sin(v * Math.PI) * 0.15;
                                z = spineZ + (v - 0.5) * leafWidth;
                            }
                            y += 0.5; 
                        }
                        break;
                    case 'heart':
                        const tH = rand2 * Math.PI * 2, rH = Math.sqrt(rand1), scaleH = 0.08;
                        x = rH * 16 * Math.pow(Math.sin(tH), 3) * scaleH;
                        y = rH * (13 * Math.cos(tH) - 5 * Math.cos(2*tH) - 2 * Math.cos(3*tH) - Math.cos(4*tH)) * scaleH;
                        const thickness3D = Math.sqrt(Math.max(0, 1.0 - rH*rH)) * 0.6;
                        z = (Math.random() - 0.5) * thickness3D; 
                        y += 0.2; 
                        break;
                    case 'explode': 
                        x = (Math.random() - 0.5) * 20; y = (Math.random() - 0.5) * 20; z = (Math.random() - 0.5) * 20;
                        break;
                    case 'frame_dynamic': 
                        if (Math.random() < 0.85) { 
                            const wOuter = 1.4, hOuter = 1.8, thick = 0.4, edge = Math.random();
                            if (edge < 0.25) { x = (Math.random()-0.5) * wOuter * 2; y = hOuter - Math.random() * thick; }
                            else if (edge < 0.5) { x = (Math.random()-0.5) * wOuter * 2; y = -hOuter + Math.random() * thick; }
                            else if (edge < 0.75) { x = -wOuter + Math.random() * thick; y = (Math.random()-0.5) * hOuter * 2; }
                            else { x = wOuter - Math.random() * thick; y = (Math.random()-0.5) * hOuter * 2; }
                            z = (Math.random() - 0.5) * 0.2; 
                        } else { 
                            x = (Math.random() - 0.5) * 2.0; y = (Math.random() - 0.5) * 2.8; z = (Math.random() - 0.5) * 0.5;
                        }
                        break;
                    case 'shatter': 
                        x = (Math.random() - 0.5) * 8.0; y = -4.0 - Math.random() * 4.0; z = (Math.random() - 0.5) * 5.0;
                        break;
                    case 'envelope_closed':
                        if (Math.random() < 0.65) { 
                            x = (Math.random()-0.5) * 3.5; y = (Math.random()-0.5) * 2.0 - 0.2; z = (Math.random()-0.5) * 0.1;
                        } else { 
                            let u = rand1, v = rand2; if (u + v > 1) { u = 1 - u; v = 1 - v; } 
                            x = -1.75 + u * 3.5 + v * 1.75; y = 0.8 + u * 0 + v * (-0.8); z = 0.1 + (Math.random()-0.5) * 0.05; 
                        }
                        break;
                    case 'envelope_open':
                        if (Math.random() < 0.65) { 
                            x = (Math.random()-0.5) * 3.5; y = (Math.random()-0.5) * 2.0 - 0.2; z = (Math.random()-0.5) * 0.1;
                        } else { 
                            let u = rand1, v = rand2; if (u + v > 1) { u = 1 - u; v = 1 - v; } 
                            x = -1.75 + u * 3.5 + v * 1.75; y = 0.8 + u * 0 + v * 1.5; z = -0.1 + (Math.random()-0.5) * 0.05; 
                        }
                        break;
                }
                positions[pIdx] = x; positions[pIdx + 1] = y; positions[pIdx + 2] = z;
            }
        }

        function transitionPattern(newPattern, durationSec = 3.0) {
            const startPositions = particles.geometry.attributes.a_startPos.array;
            const targetPositions = particles.geometry.attributes.a_targetPos.array;
            startPositions.set(targetPositions);
            targetPositions.set(patternData[newPattern]);
            particles.geometry.attributes.a_startPos.needsUpdate = true;
            particles.geometry.attributes.a_targetPos.needsUpdate = true;
            particleMaterial.uniforms.u_transition.value = 0.0; 
            particles.userData.transitioning = true;
            particles.userData.transitionStartTime = clock.elapsedTime;
            particles.userData.transitionDuration = durationSec;
        }

        function updateUIHighlight(stepIndex) {
            // removed — was causing DOM reflow lag
        }

        function showSubtitle(text) {
            // removed — subtitle panel deleted for anti-lag
            // motionIntensity still reduced briefly so gesture isn't triggered mid-animation
            if(particleMaterial) particleMaterial.uniforms.u_motionIntensity.value = 0.2;
            isUIAnimating = true;
            setTimeout(() => { isUIAnimating = false; }, 800);
        }
        function hideSubtitle() {
            if(particleMaterial) particleMaterial.uniforms.u_motionIntensity.value = 1.0;
        }

        // --- 4. LOGIKA SLIDE SUPABASE & JEMBATAN AR ---
        function updateCardUI() {
            if(slides.length > 0) {
                document.getElementById('card-title').innerText = slides[slideIndex].t || "Hana Memoria";
                document.getElementById('card-desc').innerText = slides[slideIndex].b || "...";
                document.getElementById('btn-next').innerText = (slideIndex === slides.length - 1) ? "MULAI PEMINDAIAN" : "LANJUTKAN";
            }
        }

        function nextSlide() {
            if (slideIndex < slides.length - 1) {
                const wrapper = document.getElementById('card-text-wrapper');
                wrapper.style.opacity = 0;
                setTimeout(() => {
                    slideIndex++;
                    updateCardUI();
                    wrapper.style.opacity = 1;
                }, 300);
            } else {
                startARScanner();
            }
        }

        function startARScanner() {
            // 1. Matikan UI Partikel
            document.getElementById('message-card').classList.remove('show');
            document.getElementById('ui-panel').style.display = 'none';
            document.getElementById('sensor-status').style.display = 'none';
            document.getElementById('branding').style.display = 'none';
            if(gesturePill) gesturePill.style.display = 'none';

            // 2. Tampilkan Loading Transisi
            document.getElementById('loading').innerHTML = "Membuka Kamera Pemindai...<br><span style='font-size:12px;opacity:0.5'>Mohon tunggu</span>";
            document.getElementById('loading').style.background = "#080810";
            document.getElementById('loading').classList.remove('fade-out');

            // 3. Matikan AI Kamera (MediaPipe) & Render Three.js untuk membebaskan RAM
            isAnimating = true; 
            if (mpCameraInstance) mpCameraInstance.stop();
            const videoElement = document.getElementById('webcam');
            if (videoElement.srcObject) {
                videoElement.srcObject.getTracks().forEach(track => track.stop());
            }
            if(renderer) {
                renderer.dispose();
                const cvs = document.getElementById('particle-canvas');
                if(cvs) cvs.remove();
            }

            // 4. Nyalakan MindAR (Diberi jeda agar OS sempat mematikan kamera MediaPipe)
            setTimeout(() => {
                document.getElementById('loading').classList.add('fade-out');
                document.getElementById('ar-container').classList.add('active');
                
                const scene = document.getElementById('ar-scene');
                if(scene && scene.systems["mindar-image-system"]) {
                    scene.systems["mindar-image-system"].start();
                }

                document.getElementById('tutorial-overlay').style.display = 'flex';
                
                const targetAR = document.getElementById('target-ar');
                const vid = document.getElementById('webVideo');
                targetAR.addEventListener("targetFound", () => {
                    document.getElementById('tutorial-overlay').style.display = 'none';
                    vid.play();
                });
                targetAR.addEventListener("targetLost", () => {
                    document.getElementById('tutorial-overlay').style.display = 'flex';
                    vid.pause();
                });
            }, 1000); 
        }

        // --- 5. LOGIKA GESTUR MEDIAPIPE (TAHAP 1-6) ---
        function triggerSequenceStep(stepTarget) {
            if (isAnimating) return;
            isAnimating = true;
            updateStatus("Merespons...", "#e59a8d");
            hideSubtitle();

            if (stepTarget === 1) {
                updateStatus("Mengumpulkan debu...", "#e59a8d");
                transitionPattern('singularity', 1.2);
                setTimeout(() => {
                    updateStatus("Membentuk Peti...", "#e59a8d");
                    transitionPattern('chest', 2.5);
                    setTimeout(() => { 
                        isAnimating = false; currentStage = 1; updateUIHighlight(1);
                        updateStatus("Siap.", "#e59a8d");
                        setGesturePill(1);
                        showSubtitle("Tahap 2: <span>Buka Lebar Tangan (✋)</span> untuk membuka peti.");
                    }, 2600); 
                }, 1300); 
            } 
            else if (stepTarget === 2) {
                updateStatus("Membuka Peti...", "#e59a8d");
                transitionPattern('chest_open_tulip', 3.5);
                setTimeout(() => { 
                    isAnimating = false; currentStage = 2; updateUIHighlight(2);
                    updateStatus("Siap.", "#e59a8d");
                    setGesturePill(2);
                    showSubtitle("Tahap 3: Bentuk <span>Dua Jari (✌️)</span> untuk menggugurkan kelopak.");
                }, 3600);
            }
            else if (stepTarget === 3) {
                updateStatus("Kelopak berguguran...", "#e59a8d");
                transitionPattern('heart', 4.0);
                setTimeout(() => { 
                    isAnimating = false; currentStage = 3; updateUIHighlight(3);
                    updateStatus("Siap.", "#e59a8d");
                    setGesturePill(3);
                    showSubtitle("Tahap 4: <span>Tunjuk Kedepan (☝️)</span> untuk membingkai cerita.");
                }, 4100);
            }
            else if (stepTarget === 4) {
                updateStatus("Membesarkan Hati...", "#e59a8d");
                transitionPattern('explode', 1.0);
                setTimeout(() => {
                    updateStatus("Membingkai Kenangan...", "#e59a8d");
                    transitionPattern('frame_dynamic', 3.0);
                    setTimeout(() => { 
                        isAnimating = false; currentStage = 4; updateUIHighlight(4);
                        updateStatus("Siap.", "#e59a8d");
                        setGesturePill(4);
                        showSubtitle("Tahap 5: <span>Tunjuk Ke Atas (👆)</span> untuk menyimpan ke amplop.");
                    }, 3100);
                }, 1100);
            }
            else if (stepTarget === 5) {
                updateStatus("Memecahkan Bingkai...", "#e59a8d");
                transitionPattern('shatter', 1.0);
                setTimeout(() => {
                    updateStatus("Membentuk Amplop...", "#e59a8d");
                    transitionPattern('envelope_closed', 3.0);
                    setTimeout(() => { 
                        isAnimating = false; currentStage = 5; updateUIHighlight(5);
                        updateStatus("Siap.", "#e59a8d");
                        setGesturePill(5);
                        showSubtitle("Tahap Terakhir: Beri <span>Cubitan Cinta (🫰)</span> untuk membaca pesan.");
                    }, 3100);
                }, 1100);
            }
            else if (stepTarget === 6) {
                updateStatus("Membuka Surat...", "#e59a8d");
                transitionPattern('envelope_open', 2.5);
                setTimeout(() => {
                    updateCardUI(); 
                    document.getElementById('message-card').classList.add('show');
                    if(gesturePill) gesturePill.style.opacity = '0';
                    setTimeout(() => { 
                        isAnimating = false; currentStage = 6; updateUIHighlight(0);
                        updateStatus("Selesai.", "white"); 
                    }, 3000);
                }, 1500);
            }
        }

        function initMediaPipe() {
            const videoElement = document.getElementById('webcam');
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
            hands.onResults(onHandResults);

            let lastProcessTime = 0;
            mpCameraInstance = new Camera(videoElement, {
                onFrame: async () => { 
                    const now = Date.now();
                    if (!isAnimating && !isUIAnimating && now - lastProcessTime >= 100) { 
                        await hands.send({image: videoElement}); 
                        lastProcessTime = now;
                    }
                },
                width: 320, height: 240 
            });
            
            mpCameraInstance.start().then(() => {
                document.getElementById('loading').classList.add('fade-out');
                updateStatus("Menunggu Gestur Pertama...", "white", "rgba(255,255,255,0.2)");
                
                setTimeout(() => {
                    if(currentStage === 0) showSubtitle("Tahap 1: <span>Genggam Tangan (✊)</span> untuk menyatukan kenangan.");
                }, 2000);

            }).catch(() => {
                updateStatus("Kamera Gagal Akses", "red", "red");
            });
        }

        function onHandResults(results) {
            if (isAnimating || isUIAnimating) return; 

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                const isIndexOpen = landmarks[8].y < landmarks[6].y;
                const isMiddleOpen = landmarks[12].y < landmarks[10].y;
                const isRingOpen = landmarks[16].y < landmarks[14].y;
                const isPinkyOpen = landmarks[20].y < landmarks[18].y;
                
                const pinchDist = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);
                const indexLength = Math.hypot(landmarks[8].x - landmarks[5].x, landmarks[8].y - landmarks[5].y);
                const thumbToIndexBase = Math.hypot(landmarks[4].x - landmarks[5].x, landmarks[4].y - landmarks[5].y);
                
                const isThumbOpen = thumbToIndexBase > (indexLength * 0.8);

                const isFist = !isIndexOpen && !isMiddleOpen && !isRingOpen && !isPinkyOpen;
                const isOpen = isIndexOpen && isMiddleOpen && isRingOpen && isPinkyOpen;
                const isPeace = isIndexOpen && isMiddleOpen && !isRingOpen && !isPinkyOpen;
                
                const isIndexOnly = isIndexOpen && !isMiddleOpen && !isRingOpen && !isPinkyOpen && pinchDist > 0.1 && !isThumbOpen;
                const isIndexAndThumb = isIndexOpen && !isMiddleOpen && !isRingOpen && !isPinkyOpen && isThumbOpen;
                
                const isPinch = pinchDist < 0.15 && !isMiddleOpen && !isRingOpen && !isPinkyOpen;

                let targetDetected = false;

                if (currentStage === 0 && isFist) targetDetected = true;
                else if (currentStage === 1 && isOpen) targetDetected = true;
                else if (currentStage === 2 && isPeace) targetDetected = true;
                else if (currentStage === 3 && isIndexOnly) targetDetected = true;
                else if (currentStage === 4 && isIndexAndThumb) targetDetected = true; 
                else if (currentStage === 5 && isPinch) targetDetected = true; 
                
                if (targetDetected) {
                    gestureTimer++;
                    if (gestureTimer >= 4) { 
                        if (currentStage === 0) triggerSequenceStep(1);
                        else if (currentStage === 1) triggerSequenceStep(2);
                        else if (currentStage === 2) triggerSequenceStep(3);
                        else if (currentStage === 3) triggerSequenceStep(4);
                        else if (currentStage === 4) triggerSequenceStep(5);
                        else if (currentStage === 5) triggerSequenceStep(6);
                        gestureTimer = 0;
                    }
                } else {
                    gestureTimer = 0; 
                }
            } else {
                if(!isAnimating && currentStage !== 6) {
                    updateStatus("Tangan Tidak Terdeteksi", "rgba(255,255,255,0.5)", "rgba(255,255,255,0.2)");
                }
            }
        }

        function animate() {
            if(isAnimating && renderer == null) return; // Stop jika pindah ke AR
            requestAnimationFrame(animate);

            if(particleMaterial) {
                const elapsedTime = clock.getElapsedTime();
                particleMaterial.uniforms.u_time.value = elapsedTime;

                if (particles && particles.userData.transitioning) {
                    const { transitionStartTime, transitionDuration } = particles.userData;
                    const progress = THREE.MathUtils.clamp((elapsedTime - transitionStartTime) / transitionDuration, 0, 1);
                    
                    const easedProgress = progress < .5 ? 4 * progress * progress * progress : (progress - 1) * (2 * progress - 2) * (2 * progress - 2) + 1;
                    particleMaterial.uniforms.u_transition.value = easedProgress;
                    
                    if (progress >= 1) particles.userData.transitioning = false;
                }

                if (particles && !particles.userData.transitioning) {
                    if (currentStage === 1) {
                        particles.rotation.y += 0.02;
                        particles.rotation.x = 0; particles.rotation.z = 0;
                    } else if (currentStage === 5) {
                        particles.rotation.y += 0.01;
                        particles.rotation.x = 0; particles.rotation.z = 0;
                    } else if (currentStage === 6) {
                        particles.rotation.y = THREE.MathUtils.lerp(particles.rotation.y, 0, 0.05);
                    } else {
                        particles.rotation.y = elapsedTime * 0.2;
                        particles.rotation.x = Math.cos(elapsedTime * 0.1) * 0.1;
                    }
                }

                renderer.render(scene, camera);
            }
        }

        function onWindowResize() {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }
    </script>
